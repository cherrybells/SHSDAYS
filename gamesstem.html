<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STEM Games</title>

<link rel="stylesheet" href="style.css">

<style>

*{box-sizing:border-box;}

body{
font-family:Arial;
padding:10px;
background-image:url("pictures/FORBACKGROUND.png");
background-repeat:no-repeat;
background-size:cover;
overflow-x:hidden;
}

/* HEADER */
.header{
text-align:center;
margin-bottom:20px;
}

/* NAVBAR */
.topnav{
overflow:hidden;
background-color:#0D1B3A;
}

.topnav a{
float:left;
display:block;
color:white;
text-align:center;
padding:14px 16px;
text-decoration:none;
}

.topnav a:hover{
background-color:#ddd;
color:black;
}

/* GAME CONTAINER */
.game-container{
position:relative;
width:100%;
height:70vh;
overflow:hidden;
margin:20px auto;
border:3px solid #0D1B3A;
border-radius:12px;
background-color:#87CEEB;
}

/* GAME BACKGROUND */
.background{
position:absolute;
width:100%;
height:100%;
background:url("pictures/gamesbackground.jpg") no-repeat center center;
background-size:cover;
}

/* BIRD */
.hironobird{
position:absolute;
top:40%;
left:25%;
width:8vw;
max-width:130px;
z-index:100;
}

/* PIPES */
.pipe_sprite{
position:absolute;
left:100%;
width:70px;
background:radial-gradient(lightgreen,green);
border:5px solid black;
}

/* MESSAGE */
.message{
position:absolute;
top:35%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
font-size:2vw;
color:black;
z-index:10;
}

.messageStyle{
background:linear-gradient(yellow,orange,red,black);
padding:20px;
border-radius:12px;
box-shadow:rgba(0,0,0,0.25) 0px 5px 15px;
}

/* SCORE */
.score{
position:absolute;
top:0;
left:10px;
font-size:5vh;
color:white;
-webkit-text-stroke:2px black;
z-index:20;
}

.score_val{
color:gold;
font-weight:bold;
}

/* MOBILE */
@media(max-width:768px){

.message{
font-size:5vw;
}

.hironobird{
width:20vw;
}

.pipe_sprite{
width:12vw;
}

}

</style>
</head>

<body>

<div class="header">
<h1>LAGUNA COLLEGE OF BUSINESS AND ARTS</h1>
<p>96 Years of Excellence: Thousands of Success Stories</p>
</div>

<div class="topnav">
<a href="index.html">Main Page</a>
<a href="About STEM.html">About STEM</a>
<a href="Image Gallery.html">Image Gallery</a>
<a href="Video Gallery.html">Video Gallery</a>
<a href="gamesstem.html">Games</a>
</div>

<!-- GAME AREA -->
<div class="game-container">

<div class="background"></div>

<img src="pictures/hironobird.png" class="hironobird" id="bird">

<div class="message">
Tap / Click / Press Enter to Start
<p><span style="color:blue;">↑</span> Jump</p>
</div>

<div class="score">
<span class="score_title"></span>
<span class="score_val">0</span>
</div>

</div>

<script>

/* GAME VARIABLES */

let bird=document.getElementById("bird")
let game=document.querySelector(".game-container")
let score_val=document.querySelector(".score_val")
let message=document.querySelector(".message")

let game_state="Start"

let bird_dy=0
let gravity=0.12
let jump_strength=-4.5
let move_speed=2

let pipe_timer=0
let pipe_gap=window.innerWidth<768?200:420

bird.style.display="none"
message.classList.add("messageStyle")

/* START GAME */

function startGame(){

if(game_state==="Play")return

game_state="Play"

bird.style.top="40%"
bird_dy=0

score_val.innerHTML="0"

message.innerHTML=""
message.classList.remove("messageStyle")

document.querySelectorAll(".pipe_sprite").forEach(p=>p.remove())

play()

}

/* JUMP */

function jump(){

if(game_state==="Play"){
bird_dy=jump_strength
}

}

/* KEYBOARD */

document.addEventListener("keydown",e=>{

if(e.key==="Enter")startGame()

if(e.key==="ArrowUp")jump()

})

/* CLICK */

game.addEventListener("click",()=>{

if(game_state!=="Play")startGame()
else jump()

})

/* TOUCH (ONLY GAME AREA) */

game.addEventListener("touchstart",e=>{

e.preventDefault()

if(game_state!=="Play")startGame()
else jump()

},{passive:false})

/* GAME LOOP */

function play(){

function move(){

if(game_state!=="Play")return

let bird_rect=bird.getBoundingClientRect()
let game_rect=game.getBoundingClientRect()

bird_dy+=gravity

bird.style.top=bird.offsetTop+bird_dy+"px"

/* COLLISION TOP/BOTTOM */

if(
bird.offsetTop<=0 ||
bird.offsetTop+bird.offsetHeight>=game.offsetHeight
){
return endGame()
}

/* MOVE PIPES */

document.querySelectorAll(".pipe_sprite").forEach(pipe=>{

pipe.style.left=pipe.offsetLeft-move_speed+"px"

let pipe_rect=pipe.getBoundingClientRect()

if(pipe.offsetLeft+pipe.offsetWidth<0){
pipe.remove()
}

/* COLLISION */

if(
bird_rect.left<pipe_rect.left+pipe_rect.width &&
bird_rect.left+bird_rect.width>pipe_rect.left &&
bird_rect.top<pipe_rect.top+pipe_rect.height &&
bird_rect.top+bird_rect.height>pipe_rect.top
){
return endGame()
}

/* SCORE */

if(!pipe.scored && pipe_rect.right<bird_rect.left){
score_val.innerHTML=parseInt(score_val.innerHTML)+1
pipe.scored=true
}

})

requestAnimationFrame(move)

}

/* CREATE PIPES */

function createPipe(){

if(game_state!=="Play")return

pipe_timer++

if(pipe_timer>90){

pipe_timer=0

let max_pipe_height=game.offsetHeight-pipe_gap-30
let pipe_pos=Math.random()*max_pipe_height+15

let topPipe=document.createElement("div")
topPipe.className="pipe_sprite"
topPipe.style.height=pipe_pos+"px"
topPipe.style.top="0px"
topPipe.scored=false

game.appendChild(topPipe)

let bottomPipe=document.createElement("div")
bottomPipe.className="pipe_sprite"
bottomPipe.style.height=(game.offsetHeight-pipe_pos-pipe_gap)+"px"
bottomPipe.style.top=(pipe_pos+pipe_gap)+"px"

game.appendChild(bottomPipe)

}

requestAnimationFrame(createPipe)

}

bird.style.display="block"

requestAnimationFrame(move)
requestAnimationFrame(createPipe)

}

/* END GAME */

function endGame(){

game_state="End"

bird.style.display="none"

message.innerHTML='<span style="color:red;">Game Over</span><br>Tap / Click / Press Enter to Restart'

message.classList.add("messageStyle")

}

</script>

</body>
</html>
